name: Post Kannada News

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (GitHub may delay this slightly under load)
  workflow_dispatch: {}       # lets you trigger a run manually from the Actions tab

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_CHANNEL_IDS: ${{ secrets.TELEGRAM_CHANNEL_IDS }}
          TELEGRAM_ANALYSIS_BOT_TOKEN: ${{ secrets.TELEGRAM_ANALYSIS_BOT_TOKEN }}
          TELEGRAM_ANALYSIS_CHANNEL_IDS: ${{ secrets.TELEGRAM_ANALYSIS_CHANNEL_IDS }}
          TELEGRAM_LLM_CHANNEL_IDS: ${{ secrets.TELEGRAM_LLM_CHANNEL_IDS }}
          KN_NEWS_ENABLE_LLM: ${{ secrets.KN_NEWS_ENABLE_LLM }}
          KN_NEWS_LLM_PROVIDER_ORDER: ${{ secrets.KN_NEWS_LLM_PROVIDER_ORDER || 'gemini' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      # Runtime state and exports are intentionally kept out of git.
      # If you need persistence across scheduled runs, point KN_NEWS_DB and
      # KN_NEWS_JSONL to external storage instead of committing the files back.
