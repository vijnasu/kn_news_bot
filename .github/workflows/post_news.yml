name: Post Kannada News

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (GitHub may delay this slightly under load)
  workflow_dispatch: {}       # lets you trigger a run manually from the Actions tab

permissions:
  contents: write   # needed to commit docs/analysis_feed.xml back for GitHub Pages

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_CHANNEL_IDS: ${{ secrets.TELEGRAM_CHANNEL_IDS }}
          TELEGRAM_ANALYSIS_BOT_TOKEN: ${{ secrets.TELEGRAM_ANALYSIS_BOT_TOKEN }}
          TELEGRAM_ANALYSIS_CHANNEL_IDS: ${{ secrets.TELEGRAM_ANALYSIS_CHANNEL_IDS }}
          TELEGRAM_LLM_CHANNEL_IDS: ${{ secrets.TELEGRAM_LLM_CHANNEL_IDS }}
          FACEBOOK_TARGET: ${{ vars.FACEBOOK_TARGET || 'disabled' }}
          FACEBOOK_PAGE_ID: ${{ vars.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_GROUP_ID: ${{ vars.FACEBOOK_GROUP_ID }}
          KN_NEWS_ENABLE_LLM: ${{ secrets.KN_NEWS_ENABLE_LLM }}
          KN_NEWS_ALLOW_LIVE_LLM: '1'
          KN_NEWS_LLM_PROVIDER_ORDER: ${{ secrets.KN_NEWS_LLM_PROVIDER_ORDER || 'gemini' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      # Runtime state and exports are intentionally kept out of git.
      # If you need persistence across scheduled runs, point KN_NEWS_DB and
      # KN_NEWS_JSONL to external storage instead of committing the files back.

      - name: Publish analysis feed to GitHub Pages
        run: |
          if [ -n "$(git status --porcelain docs/analysis_feed.xml)" ]; then
            git config user.name "kn-news-bot"
            git config user.email "actions@users.noreply.github.com"
            git add docs/analysis_feed.xml
            git commit -m "chore: update analysis feed [skip ci]"
            git push
          else
            echo "analysis feed unchanged, nothing to commit"
          fi
